<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Nutri Bites — Social Post Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --amber: #D97706;
    --amber-light: #FDE68A;
    --green: #15803D;
    --green-light: #BBF7D0;
    --cream: #FFFBEB;
    --bark: #78350F;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
  }
  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.2;
  }

  /* Header */
  .header-gradient {
    background: linear-gradient(135deg, #1a0a00 0%, #2d1200 50%, #1a1a00 100%);
    border-bottom: 1px solid rgba(217,119,6,0.3);
  }

  /* Sidebar */
  .sidebar {
    background: #141414;
    border-right: 1px solid rgba(255,255,255,0.07);
  }

  /* Product card */
  .product-card {
    background: #1c1c1c;
    border: 1px solid rgba(255,255,255,0.07);
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .product-card:hover { border-color: var(--amber); transform: translateY(-1px); }
  .product-card.active {
    border-color: var(--amber);
    background: rgba(217,119,6,0.1);
    box-shadow: 0 0 0 1px var(--amber);
  }

  /* Weight pills */
  .weight-pill {
    background: #252525;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 99px;
    color: #aaa;
  }
  .weight-pill:hover { border-color: var(--amber); color: var(--amber); }
  .weight-pill.active {
    background: var(--amber);
    border-color: var(--amber);
    color: #fff;
    font-weight: 600;
  }

  /* Template selector */
  .tmpl-btn {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
    overflow: hidden;
    position: relative;
  }
  .tmpl-btn:hover, .tmpl-btn.active { border-color: #fff; transform: scale(1.08); }

  /* ===================== POST CANVAS ===================== */
  #post-canvas-wrap {
    aspect-ratio: 1/1;
    width: 100%;
    max-width: 540px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8);
  }
  #post-canvas {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* — Template 1: GOLDEN HARVEST — */
  .tmpl-1 { background: linear-gradient(145deg, #2d1200 0%, #5c2d00 40%, #2d4000 100%); }
  .tmpl-1 .post-bg-deco {
    background: radial-gradient(circle at 80% 20%, rgba(217,119,6,0.55) 0%, transparent 60%),
                radial-gradient(circle at 20% 80%, rgba(21,128,61,0.4) 0%, transparent 50%);
  }
  .tmpl-1 .post-accent { color: #FDE68A; }
  .tmpl-1 .post-price-bg { background: linear-gradient(135deg, #D97706, #F59E0B); }
  .tmpl-1 .post-tag { background: rgba(253,230,138,0.2); color: #FDE68A; border: 1px solid rgba(253,230,138,0.4); }
  .tmpl-1 .post-divider { background: linear-gradient(90deg, transparent, #D97706, transparent); }
  .tmpl-1 .post-footer { background: linear-gradient(0deg, rgba(0,0,0,0.5), transparent); }
  .tmpl-1 .qr-wrap { background: #fff; }

  /* — Template 2: FOREST FRESH — */
  .tmpl-2 { background: linear-gradient(160deg, #0f3018 0%, #164d28 50%, #0a2e12 100%); }
  .tmpl-2 .post-bg-deco {
    background: radial-gradient(circle at 30% 30%, rgba(21,128,61,0.6) 0%, transparent 55%),
                radial-gradient(circle at 70% 80%, rgba(253,230,138,0.3) 0%, transparent 45%);
  }
  .tmpl-2 .post-accent { color: #6EE7B7; }
  .tmpl-2 .post-price-bg { background: linear-gradient(135deg, #15803D, #22C55E); }
  .tmpl-2 .post-tag { background: rgba(110,231,183,0.18); color: #6EE7B7; border: 1px solid rgba(110,231,183,0.35); }
  .tmpl-2 .post-divider { background: linear-gradient(90deg, transparent, #22C55E, transparent); }
  .tmpl-2 .post-footer { background: linear-gradient(0deg, rgba(0,0,0,0.45), transparent); }
  .tmpl-2 .qr-wrap { background: #fff; }

  /* — Template 3: SUNSET SPICE — */
  .tmpl-3 { background: linear-gradient(145deg, #2e0808 0%, #4d1a00 40%, #2e142e 100%); }
  .tmpl-3 .post-bg-deco {
    background: radial-gradient(circle at 75% 25%, rgba(239,68,68,0.5) 0%, transparent 50%),
                radial-gradient(circle at 25% 75%, rgba(234,88,12,0.55) 0%, transparent 55%);
  }
  .tmpl-3 .post-accent { color: #FCA5A5; }
  .tmpl-3 .post-price-bg { background: linear-gradient(135deg, #DC2626, #F97316); }
  .tmpl-3 .post-tag { background: rgba(252,165,165,0.18); color: #FCA5A5; border: 1px solid rgba(252,165,165,0.35); }
  .tmpl-3 .post-divider { background: linear-gradient(90deg, transparent, #F97316, transparent); }
  .tmpl-3 .post-footer { background: linear-gradient(0deg, rgba(0,0,0,0.45), transparent); }
  .tmpl-3 .qr-wrap { background: #fff; }

  /* — Template 4: MIDNIGHT LUXURY — */
  .tmpl-4 { background: linear-gradient(145deg, #121230 0%, #1e1e5c 50%, #141428 100%); }
  .tmpl-4 .post-bg-deco {
    background: radial-gradient(circle at 80% 20%, rgba(139,92,246,0.55) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(6,182,212,0.35) 0%, transparent 50%);
  }
  .tmpl-4 .post-accent { color: #C4B5FD; }
  .tmpl-4 .post-price-bg { background: linear-gradient(135deg, #7C3AED, #A855F7); }
  .tmpl-4 .post-tag { background: rgba(196,181,253,0.16); color: #C4B5FD; border: 1px solid rgba(196,181,253,0.35); }
  .tmpl-4 .post-divider { background: linear-gradient(90deg, transparent, #A855F7, transparent); }
  .tmpl-4 .post-footer { background: linear-gradient(0deg, rgba(0,0,0,0.45), transparent); }
  .tmpl-4 .qr-wrap { background: #fff; }

  /* — Template 5: TROPICAL BURST — */
  .tmpl-5 { background: linear-gradient(145deg, #003030 0%, #004830 50%, #003018 100%); }
  .tmpl-5 .post-bg-deco {
    background: radial-gradient(circle at 70% 30%, rgba(20,184,166,0.55) 0%, transparent 55%),
                radial-gradient(circle at 30% 70%, rgba(234,179,8,0.45) 0%, transparent 50%);
  }
  .tmpl-5 .post-accent { color: #5EEAD4; }
  .tmpl-5 .post-price-bg { background: linear-gradient(135deg, #0D9488, #14B8A6); }
  .tmpl-5 .post-tag { background: rgba(94,234,212,0.16); color: #5EEAD4; border: 1px solid rgba(94,234,212,0.35); }
  .tmpl-5 .post-divider { background: linear-gradient(90deg, transparent, #14B8A6, transparent); }
  .tmpl-5 .post-footer { background: linear-gradient(0deg, rgba(0,0,0,0.45), transparent); }
  .tmpl-5 .qr-wrap { background: #fff; }

  /* ======= Post interior layout ======= */
  .post-inner {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .post-bg-deco {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  /* Geometric lines */
  .post-geo {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .post-geo::before, .post-geo::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .post-geo::before { width: 120%; padding-bottom: 120%; top: -60%; left: -10%; }
  .post-geo::after  { width: 80%;  padding-bottom: 80%;  bottom: -30%; right: -20%; }

  .post-header-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 10px;
    z-index: 10;
  }
  .post-company-name {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(14px, 3vw, 24px);
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.95);
  }
  .post-category-badge {
    font-size: clamp(9px, 1.8vw, 12px);
    padding: 4px 12px;
    border-radius: 99px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* Product image */
  .post-img-zone {
    flex: 1 1 auto;
    min-height: 0;
    max-height: 45%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 44px 20px 0;
  }
  .post-img-glow {
    position: absolute;
    width: 65%;
    padding-bottom: 65%;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.25;
    background: radial-gradient(circle, rgba(255,235,205,0.3), transparent 70%);
  }
  .post-img {
    width: clamp(180px, 50%, 300px);
    height: clamp(180px, 50%, 300px);
    object-fit: contain;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 12px 24px rgba(0,0,0,0.35));
    transition: transform 0.3s ease;
  }

  /* Badge on image */
  .post-badge-float {
    position: absolute;
    top: 70px;
    right: 16px;
    z-index: 10;
    width: clamp(52px, 10%, 72px);
    height: clamp(52px, 10%, 72px);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: clamp(7px, 1.4vw, 11px);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-align: center;
    line-height: 1.15;
    white-space: pre-line;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }

  /* Bottom info area */
  .post-info {
    padding: 10px 18px 50px;
    position: relative;
    z-index: 5;
    flex-shrink: 0;
  }
  .post-divider {
    height: 1px;
    margin-bottom: 10px;
    opacity: 0.6;
  }
  .post-product-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(16px, 3.2vw, 24px);
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .post-desc {
    font-size: clamp(9px, 1.6vw, 12px);
    color: rgba(255,255,255,0.7);
    margin-bottom: 8px;
    font-weight: 400;
  }

  .post-benefits-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }
  .post-benefit-tag {
    font-size: clamp(8px, 1.4vw, 11px);
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .post-bottom-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .post-price-block { display: flex; align-items: baseline; gap: 8px; }
  .post-price-main {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(22px, 5vw, 38px);
    line-height: 1;
    color: #fff;
  }
  .post-price-old {
    font-size: clamp(10px, 1.8vw, 14px);
    text-decoration: line-through;
    color: rgba(255,255,255,0.55);
  }
  .post-price-weight {
    font-size: clamp(9px, 1.5vw, 12px);
    color: rgba(255,255,255,0.65);
    margin-top: 1px;
  }

  .post-save-chip {
    font-size: clamp(8px, 1.4vw, 11px);
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .post-qr-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .qr-wrap {
    padding: 4px;
    border-radius: 6px;
  }
  .qr-wrap canvas, .qr-wrap img { display: block; border-radius: 3px; }
  .post-qr-label {
    font-size: clamp(7px, 1.1vw, 9px);
    color: rgba(255,255,255,0.6);
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* Nutrition strip */
  .post-nutrition-strip {
    display: flex;
    gap: 0;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .post-nut-item {
    flex: 1;
    padding: 4px 2px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  .post-nut-item:last-child { border-right: none; }
  .post-nut-val {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(11px, 2.2vw, 16px);
    color: #fff;
    display: flex;
    align-items: baseline;
    justify-content: center;
  }
  .post-nut-unit {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7em;
    font-weight: 500;
  }
  .post-nut-key {
    font-size: clamp(7px, 1.1vw, 9px);
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Footer */
  .post-footer-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 6;
  }
  .post-website-text {
    font-size: clamp(8px, 1.3vw, 11px);
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.1em;
    font-weight: 500;
  }

  /* Controls panel */
  .ctrl-section { margin-bottom: 20px; }
  .ctrl-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.35);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .ctrl-input {
    width: 100%;
    background: #222;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #fff;
    padding: 9px 12px;
    font-size: 13px;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s;
  }
  .ctrl-input:focus { border-color: var(--amber); }

  /* Download button */
  .dl-btn {
    background: linear-gradient(135deg, #D97706, #F59E0B);
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .dl-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(217,119,6,0.4); }
  .dl-btn:active { transform: translateY(0); }

  .copy-btn {
    background: #252525;
    border: 1px solid rgba(255,255,255,0.12);
    color: #ccc;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    width: 100%;
    transition: all 0.15s;
    margin-top: 8px;
  }
  .copy-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* Loading */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    display: none;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(217,119,6,0.3);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1c1c1c;
    border: 1px solid rgba(217,119,6,0.4);
    color: #FDE68A;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    z-index: 9998;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Scrollable sidebar on mobile */
  @media (max-width: 900px) {
    .layout { flex-direction: column !important; }
    .sidebar { width: 100% !important; max-height: 300px; overflow-y: auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .preview-area { width: 100% !important; }
  }

  /* Animated shimmer on post */
  @keyframes shimmer {
    0% { opacity: 0.3; transform: translateX(-100%) rotate(30deg); }
    100% { opacity: 0; transform: translateX(300%) rotate(30deg); }
  }
  .post-shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.04) 50%, transparent 70%);
    animation: shimmer 4s ease infinite;
    pointer-events: none;
    z-index: 20;
  }

  /* Slide-in */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-up { animation: slideUp 0.35s ease forwards; }

  .post-corner-deco {
    position: absolute;
    bottom: 28px;
    left: 16px;
    width: clamp(30px, 6%, 48px);
    height: clamp(30px, 6%, 48px);
    opacity: 0.12;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div style="text-align:center">
    <div class="spinner" style="margin:0 auto 12px"></div>
    <div style="color:#FDE68A;font-size:13px;letter-spacing:0.1em">GENERATING POST…</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span>✓</span><span id="toastMsg">Downloaded!</span>
</div>

<!-- Header -->
<div class="header-gradient px-6 py-4 flex items-center justify-between">
  <div>
    <div style="font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:0.1em;color:#FDE68A">GT Nutri Bites</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.12em;margin-top:-2px">SOCIAL POST GENERATOR</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div style="background:rgba(217,119,6,0.15);border:1px solid rgba(217,119,6,0.3);border-radius:8px;padding:6px 14px;font-size:12px;color:#FDE68A">
      ✦ 1:1 Square Format
    </div>
  </div>
</div>

<!-- Main Layout -->
<div class="layout" style="display:flex;min-height:calc(100vh - 64px)">

  <!-- LEFT SIDEBAR — Controls -->
  <div class="sidebar" style="width:280px;min-width:260px;padding:20px;overflow-y:auto;max-height:calc(100vh - 64px)">

    <!-- Company Settings -->
    <div class="ctrl-section">
      <div class="ctrl-label">🏪 Company Settings</div>
      <input class="ctrl-input" id="companyName" type="text" placeholder="Company Name" value="GT Nutri Bites" style="margin-bottom:8px">
      <input class="ctrl-input" id="websiteUrl" type="text" placeholder="Website URL" value="gt-nutri-bites.github.io">
      <input class="ctrl-input" id="tagline" type="text" placeholder="Tagline (optional)" value="Fresh. Nutritious. Delicious." style="margin-top:8px">
    </div>

    <!-- Template -->
    <div class="ctrl-section">
      <div class="ctrl-label">🎨 Color Theme</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div class="tmpl-btn active" data-tmpl="1" title="Golden Harvest" style="background:linear-gradient(135deg,#3d1a00,#D97706)">
          <span style="position:absolute;bottom:2px;right:2px;font-size:7px;color:rgba(255,255,255,0.7);font-weight:600">G</span>

// Format nutrition value: separate number from unit so "g" renders in a regular font (not Bebas Neue which is all-caps)
function formatNutVal(val) {
  const normalized = val.trim().replace(/\s+/g, '');
  const match = normalized.match(/^([\d.]+)(.*)$/);
  if (match && match[2]) {
    return `${match[1]}<span class="post-nut-unit">${match[2]}</span>`;
  }
  return val;
}

// ===========================
// QR CODE
// ===========================
function generateQR(url) {
  return new Promise(resolve => {
    const container = document.getElementById('qrGen');
    container.innerHTML = '';
    const div = document.createElement('div');
    container.appendChild(div);
    try {
      new QRCode(div, {
        text: url || 'https://gt-nutri-bites.github.io',
        width: 80, height: 80,
        colorDark: '#000', colorLight: '#fff',
        correctLevel: QRCode.CorrectLevel.M
      });
      setTimeout(() => {
        const img = div.querySelector('img') || div.querySelector('canvas');
        if (img) resolve(img.tagName === 'IMG' ? img.src : img.toDataURL());
        else resolve('');
      }, 200);
    } catch(e) { resolve(''); }
  });
}

// ===========================
// BACKGROUND REMOVAL (Cloudinary)
// ===========================
const bgRemovalCache = {};

function getBackgroundRemovedUrl(url) {
  return url.replace('/upload/', '/upload/e_background_removal/');
}

function tryLoadBgRemovedImage(originalUrl) {
  // Skip if already tested (avoids retrying failed removals)
  if (bgRemovalCache[originalUrl] !== undefined) return;
  bgRemovalCache[originalUrl] = null; // Mark as in-progress to prevent duplicate requests
  const bgRemovedUrl = getBackgroundRemovedUrl(originalUrl);
  const testImg = new Image();
  testImg.crossOrigin = 'anonymous';
  testImg.onload = function() {
    bgRemovalCache[originalUrl] = bgRemovedUrl;
    // Only update the post image if it still matches the current product
    const postImg = document.querySelector('.post-img');
    if (postImg && postImg.dataset.original === originalUrl) {
      postImg.src = bgRemovedUrl;
    }
  };
  testImg.onerror = function() {
    bgRemovalCache[originalUrl] = originalUrl;
  };
  testImg.src = bgRemovedUrl;
}

      <circle cx="30" cy="30" r="28" stroke="white" stroke-width="1"/>
      <circle cx="30" cy="30" r="20" stroke="white" stroke-width="0.5"/>
      <line x1="30" y1="2" x2="30" y2="58" stroke="white" stroke-width="0.5"/>
      <line x1="2" y1="30" x2="58" y2="30" stroke="white" stroke-width="0.5"/>
    </svg>

    <!-- Top header -->
    <div class="post-header-bar">
      <div>
        <div class="post-company-name">${company}</div>
        ${tagline ? `<div style="font-size:clamp(7px,1.2vw,9px);color:rgba(255,255,255,0.45);letter-spacing:0.06em;margin-top:1px">${tagline}</div>` : ''}
      </div>
      <div class="post-category-badge post-tag">${p.category}</div>
    </div>

    <!-- Badge float -->
    ${p.badge ? `<div class="post-badge-float" style="background:${bStyle.bg};color:${bStyle.color}">
      <span style="font-size:inherit">${p.badge.replaceAll(' ','<br>')}</span>
    </div>` : ''}

    <!-- Image zone -->
    <div class="post-img-zone">
      <div class="post-img-glow"></div>
      <img class="post-img" src="${bgRemovalCache[p.image] || p.image}" data-original="${p.image}" crossorigin="anonymous" alt="${p.name}">
    </div>

    <!-- Info -->
    <div class="post-info">
      <div class="post-divider"></div>

      ${showNutrition ? `
      <div class="post-nutrition-strip">
        <div class="post-nut-item">
          <div class="post-nut-val">${calValue}</div>
          <div class="post-nut-key">Kcal</div>
          ${calServing ? `<div class="post-nut-key" style="font-size:clamp(6px,1vw,8px);margin-top:1px">${calServing}</div>` : ''}
        </div>
        <div class="post-nut-item">
          <div class="post-nut-val">${formatNutVal(p.nutrition.protein)}</div>
          <div class="post-nut-key">Protein</div>
        </div>
        <div class="post-nut-item">
          <div class="post-nut-val">${formatNutVal(p.nutrition.fat)}</div>
          <div class="post-nut-key">Fat</div>
        </div>
        <div class="post-nut-item">
          <div class="post-nut-val">${formatNutVal(p.nutrition.carbs)}</div>
          <div class="post-nut-key">Carbs</div>
        </div>
        <div class="post-nut-item">
          <div class="post-nut-val">${formatNutVal(p.nutrition.fiber)}</div>
          <div class="post-nut-key">Fiber</div>
        </div>
      </div>` : ''}

      <div class="post-product-name">${p.name}</div>
      <div class="post-desc">${p.description}</div>

      ${showBenefits && p.benefits ? `
      <div class="post-benefits-row">
        ${p.benefits.slice(0,3).map(b => `<span class="post-benefit-tag post-tag">${b}</span>`).join('')}
      </div>` : ''}

      <!-- Bottom row -->
      <div class="post-bottom-row">
        <div>
          <div class="post-price-block">
            <div class="post-price-main">Rs. ${price.toLocaleString()}</div>
            ${showOldPrice && oldPrice ? `<div class="post-price-old">Rs. ${oldPrice.toLocaleString()}</div>` : ''}
          </div>
          <div class="post-price-weight" style="margin-top:2px">per ${w}</div>
            ${showOldPrice && saving > 0 ? `<div style="margin-top:4px"><span class="post-save-chip post-price-bg">SAVE Rs.${saving}</span></div>` : ''}
        </div>

        ${showQR && qrUrl ? `
        <div class="post-qr-col">
          <div class="qr-wrap"><img src="${qrUrl}" width="48" height="48" style="display:block"></div>
          <div class="post-qr-label">Scan to Order</div>
        </div>` : ''}
      </div>
    </div>

    <!-- Footer -->
    <div class="post-footer-bar post-footer">
      <div class="post-website-text">${website.toUpperCase()}</div>
    </div>
  `;

  // Update caption
  updateCaption(p, price, w, website, company);

  // Try background removal in background (non-blocking)
  tryLoadBgRemovedImage(p.image);
}

// ===========================
// CAPTION
// ===========================
function updateCaption(p, price, w, website, company) {
  const hashtags = {
    nuts: '#almonds #nuts #healthysnacks #organicnuts #premium',
    seeds: '#seeds #healthyfood #superfood #nutrients #wellness',
    dried_fruits: '#driedfruits #healthysnack #natural #organic',
    mix: '#mixednuts #healthy #snack #premium #organic'
  };
  const ht = hashtags[p.type] || '#healthyfood #natural #organic';

  const caption = `✨ ${p.name} — Now Available!

${p.description}

🌟 Key Benefits:
${p.benefits.slice(0,3).map(b => `• ${b}`).join('\n')}

💰 Price: Rs. ${price.toLocaleString()} / ${w}

🛒 Order Now: ${website}
📦 Fast Delivery Island-wide

${ht} #${company.replace(/\s+/g,'').toLowerCase()} #srilanka #nutrisri`;

  document.getElementById('captionText').textContent = caption;
}

// ===========================
// RENDER ALL
// ===========================
async function renderAll() {
  // Update active states
  document.querySelectorAll('.product-card').forEach((c, i) => {
    c.classList.toggle('active', data.products[i].id === state.product.id);
  });
  buildWeightPills();
  await renderPost();
}

// ===========================
// DOWNLOAD
// ===========================
document.getElementById('downloadBtn').addEventListener('click', async () => {
  const overlay = document.getElementById('loadingOverlay');
  overlay.style.display = 'flex';
  try {
    const canvas = document.getElementById('post-canvas');
    const wrap = document.getElementById('post-canvas-wrap');
    
    // Export at native 1080x1080 resolution for perfect 1:1 aspect ratio
    const exportSize = 1080;
    
    // Store original dimensions to restore after export
    const originalWidth = canvas.style.width;
    const originalHeight = canvas.style.height;
    const wrapOriginalWidth = wrap.style.width;
    const wrapOriginalHeight = wrap.style.height;
    const wrapOriginalMaxWidth = wrap.style.maxWidth;
    
    // Temporarily set exact dimensions for export to ensure proper rendering
    wrap.style.width = exportSize + 'px';
    wrap.style.height = exportSize + 'px';
    wrap.style.maxWidth = exportSize + 'px';
    canvas.style.width = exportSize + 'px';
    canvas.style.height = exportSize + 'px';
    
    // Small delay to allow browser to reflow at new dimensions
    await new Promise(resolve => setTimeout(resolve, 100));

    let result;
    try {
      result = await html2canvas(canvas, {
        width: exportSize,
        height: exportSize,
        scale: 1,  // Render at native resolution, no upscaling
        useCORS: true,
        allowTaint: false,
        logging: false,
        backgroundColor: null,
        windowWidth: exportSize,   // Set viewport context for clamp() calculations
        windowHeight: exportSize,
      });
    } catch (corsError) {
      // Fallback: allow tainted canvas for degraded-but-functional export when CORS fails
      result = await html2canvas(canvas, {
        width: exportSize,
        height: exportSize,
        scale: 1,
        useCORS: true,
        allowTaint: true,
        logging: false,
        backgroundColor: null,
        windowWidth: exportSize,
        windowHeight: exportSize,
      });
    }
    
    // Restore original dimensions
    wrap.style.width = wrapOriginalWidth;
    wrap.style.height = wrapOriginalHeight;
    wrap.style.maxWidth = wrapOriginalMaxWidth;
    canvas.style.width = originalWidth;
    canvas.style.height = originalHeight;

    const link = document.createElement('a');
    link.download = `${state.product.name.replace(/\s+/g,'_')}_${state.weight}_post.png`;
    link.href = result.toDataURL('image/png');
    link.click();
    showToast('✓ Post downloaded!');
  } catch(e) {
    showToast('⚠ Error generating image. Try again.');
    console.error(e);
  }
  overlay.style.display = 'none';
});

// ===========================
// COPY CAPTION
// ===========================
document.getElementById('copyCaption').addEventListener('click', () => {
  const text = document.getElementById('captionText').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('Caption copied to clipboard!'));
});

// ===========================
// TEMPLATE BUTTONS
// ===========================
document.querySelectorAll('.tmpl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tmpl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.tmpl = parseInt(btn.dataset.tmpl);
    document.getElementById('tmplName').textContent = tmplNames[state.tmpl];
    renderAll();
  });
});

// ===========================
// SETTINGS INPUTS
// ===========================
['companyName','websiteUrl','tagline'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => renderAll());
});
['showNutrition','showBenefits','showOldPrice','showQR'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => renderAll());
});

// ===========================
// TOAST
// ===========================
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===========================
// INIT
// ===========================
buildProductList();
buildThumbGrid();
// Pre-cache background-removed images for all products
data.products.forEach(p => tryLoadBgRemovedImage(p.image));
renderAll();
</script>
</body>
</html>
